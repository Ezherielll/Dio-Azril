  <style>
    body {
      background-color: #171614;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .loader {
      border: 4px solid #1C1B19;
      border-top: 4px solid #4F98A3;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }
    .loading-text {
      margin-top: 20px;
      color: #CDCCCA;
      letter-spacing: 2px;
      font-size: 14px;
      text-transform: uppercase;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading-container" id="loading">
    <div class="loader"></div>
    <div class="loading-text">Loading My World...</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  
  <script>
    window.addEventListener('load', function() {
      // Logic to hide the loader is handled by Flutter when it's ready, 
      // but we can add a fallback or just let Flutter paint over it.
    });
  </script>
</body>
